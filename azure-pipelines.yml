trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

variables:
  buildConfiguration: 'Release'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: BuildAndTest
    displayName: Build and Test
    jobs:
      - job: Build
        displayName: Build, Test & Publish
        timeoutInMinutes: 20
        steps:
          - checkout: self
            fetchDepth: 0

          - task: UseDotNet@2
            displayName: Setup .NET 8 SDK
            inputs:
              packageType: sdk
              version: 8.0.x

          - task: Cache@2
            displayName: Cache NuGet packages
            inputs:
              key: 'nuget | "$(Agent.OS)" | **/*.csproj, **/Directory.Build.props'
              restoreKeys: |
                nuget | "$(Agent.OS)"
              path: $(HOME)/.nuget/packages

          - script: dotnet restore ImportAssetToOptiDam.sln
            displayName: Restore

          - script: dotnet build ImportAssetToOptiDam.sln --configuration $(buildConfiguration) --no-restore
            displayName: Build

          - script: |
              dotnet test ImportAssetToOptiDam.sln \
                --configuration $(buildConfiguration) \
                --no-build \
                --logger "trx" \
                --collect:"XPlat Code Coverage" \
                --results-directory $(Agent.TempDirectory)/TestResults
            displayName: Test

          - task: PublishTestResults@2
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'
              mergeTestResults: true
              failTaskOnFailedTests: true

          - task: PublishCodeCoverageResults@2
            displayName: Publish code coverage
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/TestResults/**/coverage.cobertura.xml'

          - script: |
              dotnet publish ImportAssetToOptiDam/ImportAssetToOptiDam.csproj \
                --configuration $(buildConfiguration) \
                --no-build \
                --output $(Build.ArtifactStagingDirectory)/app
            displayName: Publish application

          - task: PublishBuildArtifacts@1
            displayName: Upload artifact
            inputs:
              pathToPublish: $(Build.ArtifactStagingDirectory)/app
              artifactName: ImportAssetToOptiDam
